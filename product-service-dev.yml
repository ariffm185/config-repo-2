global:
  message: Welcome to product-services!
server:
  port: 8082
  message: hello from dev environment!
spring:
  application:
    name: product-services
  datasource:
    url: jdbc:h2:mem:productDBdev
    username: root
    password: 1080
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.h2Dialect
    properties:
      hibernate:
        format-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
management:
  endpoints:
    web:
      exposure:
        include: "*"
    endpoint:
      health:
        show-details: always
