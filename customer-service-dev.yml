global:
  message: Welcome to customer-services!
server:
  port: 8081
  message: hello from dev environment!
spring:
  application:
    name: customer-services
  datasource:
    url: jdbc:mysql://localhost:3306/custDB1
    username: root
    password: 1080
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      hibernate:
        format-sql: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
management:
  endpoints:
    web:
      exposure:
        include: "*"
    endpoint:
      health:
        show-details: always
